<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="finsh.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="menu">
        <ul>
            <li class="profile"> 
                <div class="img">
                    <img src="Imgs.png" alt="Profile">
                </div>
                <h2>Ibrahim</h2>
            </li>

            <li>
                <a class="active" href="#">
                    <i class="fas fa-home"></i>
                    <p>Dashboard</p>
                </a>
            </li>

            <li>
                <a href="#">
                    <i class="fas fa-user"></i>
                    <p>Users</p>
                </a>
            </li>

            <li>
                <a href="#">
                    <i class="fas fa-table"></i>
                    <p>Product</p>
                </a>
            </li>

            <li>
                <a href="#">
                    <i class="fas fa-chart-pie"></i>
                    <p>Chart</p>
                </a>
            </li>

            <li>
                <a href="#">
                    <i class="fas fa-pen"></i>
                    <p>Posts</p>
                </a>
            </li>

            <li>
                <a href="#">
                    <i class="fas fa-star"></i>
                    <p>Love</p>
                </a>
            </li>

            <li>
                <a href="#">
                    <i class="fas fa-cog"></i>
                    <p>Settings</p>
                </a>
            </li>

            <li class="log-out">
                <a href="#">
                    <i class="fas fa-sign-out" aria-hidden="true"></i>
                    <p>Log out</p>
                </a>
            </li>
        </ul>
    </div>

    <div class="content">
        <div class="title-info">
            <p>Dashboard</p>
            <i class="fas fa-chart-bar"></i>
        </div>

        <div class="data-info">
            <div class="box">
                <i class="fas fa-user"></i>
                <div class="data">
                    <p>Users</p>
                    <span>400</span>
                </div>
            </div>

            <div class="box">
                <i class="fas fa-dollar"></i>
                <div class="data">
                    <p>Feedback</p>
                    <span>300</span>
                </div>
            </div>

            <div class="box">
                <i class="fas fa-table"></i>
                <div class="data">
                    <p>Rewards</p>
                    <span>140</span>
                </div>
            </div>

            <div class="box">
                <i class="fas fa-home"></i>
                <div class="data">
                    <p>Reload</p>
                    <span>10</span>
                </div>
            </div>
        </div>
        <div class="title-info">
            <p>prouduct</p>
            <i class="fas fa-chart-bar"></i>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Product</th>
                    <th>price</th>
                    <th>count</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>tv</td>
                    <td>123</td>
                    <td>12</td>
                </tr>
                <tr>
                    <td>tv</td>
                    <td>123</td>
                    <td>12</td>
                </tr>
                <tr>
                    <td>tv</td>
                    <td>123</td>
                    <td>12</td>
                </tr>
                <tr>
                    <td>tv</td>
                    <td>123</td>
                    <td>12</td>
                </tr>
            </tbody>
        </table>

    </div>
</body>
</html>
